<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meeting Summary | TraductorWebGPU</title>
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles/main.scss" />
</head>
<body class="summary-page">
  <div class="app">
    <!-- Background Effects -->
    <div class="background-effects">
      <div class="gradient-orb orb-1"></div>
      <div class="gradient-orb orb-2"></div>
      <div class="gradient-orb orb-3"></div>
    </div>

    <!-- Main Container -->
    <main class="container summary-container">
      <!-- Header Component Placeholder -->
      <div id="app-header"></div>

      <section class="summary-card glass-card">
        <div class="summary-card-header">
          <div style="display: flex; align-items: center; gap: var(--spacing-md);">
            <button id="btn-close" class="icon-btn" title="Close Summary" data-i18n="close_summary_tooltip" style="font-size: 1.2rem;">←</button>
            <h2 data-i18n="summary_title">📄 Detailed Meeting Summary</h2>
          </div>
          <div class="summary-actions">
            <button id="btn-regenerate" class="icon-btn" title="Regenerate Summary" data-i18n="regenerate_tooltip" disabled>
              🔄
            </button>
            <button id="btn-export-txt" class="icon-btn" title="Export to TXT" data-i18n="export_txt_tooltip" disabled>
              📝
            </button>
            <button id="btn-export-doc" class="icon-btn" title="Export to Word" data-i18n="export_word_tooltip" disabled>
              📄
            </button>
          </div>
        </div>

        <div class="summary-content-wrapper">
          <div id="loading-state" class="loading-state">
            <div class="spinner"></div>
            <h3 data-i18n="generating_summary">Generating AI summary...</h3>
            <p data-i18n="generating_note">This may take a few seconds depending on the meeting length and the selected model.</p>
          </div>

          <div id="error-state" class="error-state hidden">
            <h3>⚠️ <span data-i18n="error_title">An error occurred</span></h3>
            <p id="error-message" data-i18n="error_default">Could not generate summary.</p>
            <button id="btn-retry" class="primary-btn mt-md" data-i18n="retry">Retry</button>
          </div>

          <div id="summary-content" class="summary-content hidden">
            <!-- El contenido generado por IA se insertará aquí -->
          </div>
        </div>
      </section>

      <!-- Footer Component Placeholder -->
      <div id="app-footer"></div>
    </main>
  </div>

  <script type="module" src="/src/summary.js"></script>
</body>
</html>
